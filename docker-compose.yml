services:
  xpo-server:
    build: .
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - HTTP_PORT=8080
      - WS_PORT=8081
      - BASE_DOMAIN=localhost
      - SCHEME=http
      - REGION=local
      - JWT_SECRET=xpo-dev-secret-for-local-testing
      - RUST_LOG=xpo_server=info
    restart: unless-stopped

  xpo-server-tls:
    build: .
    ports:
      - "443:443"
      - "8081:8081"
    environment:
      - HTTP_PORT=443
      - WS_PORT=8081
      - BASE_DOMAIN=xpo.sh
      - SCHEME=https
      - REGION=eu1
      - RUST_LOG=xpo_server=info
      - ACME_ENABLED=true
      - ACME_EMAIL=${ACME_EMAIL}
      - ACME_STAGING=false
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_ZONE_ID=${CF_ZONE_ID}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - certs:/etc/xpo/certs
      - acme:/etc/xpo/acme
    restart: unless-stopped
    profiles:
      - production

volumes:
  certs:
  acme:
