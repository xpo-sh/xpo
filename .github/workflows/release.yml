name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            server: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            server: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true

    steps:
      - uses: actions/checkout@v5

      - name: Verify version matches tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          if [ "$TAG" != "$CARGO" ]; then
            echo "::error::Tag v${TAG} does not match Cargo.toml version ${CARGO}"
            echo "Run: sed -i 's/version = \".*\"/version = \"${TAG}\"/' Cargo.toml"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build client (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }} -p xpo

      - name: Build client (cross)
        if: matrix.cross
        shell: bash
        run: |
          for attempt in 1 2 3; do
            cross build --release --target ${{ matrix.target }} -p xpo && exit 0
            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi
            sleep $((attempt * 15))
          done

      - name: Build server (native)
        if: matrix.server && !matrix.cross
        run: cargo build --release --target ${{ matrix.target }} -p xpo-server

      - name: Build server (cross)
        if: matrix.server && matrix.cross
        shell: bash
        run: |
          for attempt in 1 2 3; do
            cross build --release --target ${{ matrix.target }} -p xpo-server && exit 0
            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi
            sleep $((attempt * 15))
          done

      - name: Package client
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../xpo-${{ matrix.target }}.tar.gz xpo

      - name: Package server
        if: matrix.server
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../xpo-server-${{ matrix.target }}.tar.gz xpo-server

      - uses: actions/upload-artifact@v6
        with:
          name: xpo-${{ matrix.target }}
          path: xpo-${{ matrix.target }}.tar.gz

      - uses: actions/upload-artifact@v6
        if: matrix.server
        with:
          name: xpo-server-${{ matrix.target }}
          path: xpo-server-${{ matrix.target }}.tar.gz

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: sha256sum xpo-*.tar.gz > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            xpo-*.tar.gz
            SHA256SUMS
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true

  deploy:
    name: Deploy to production
    needs: release
    runs-on: ubuntu-latest
    if: github.repository == 'xpo-sh/xpo'
    steps:
      - name: Deploy xpo-server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: VERSION
          script: |
            set -e
            ARCH="x86_64-unknown-linux-gnu"
            BINARY="/usr/local/bin/xpo-server"
            URL="https://github.com/xpo-sh/xpo/releases/download/${VERSION}/xpo-server-${ARCH}.tar.gz"
            TMPDIR=$(mktemp -d)
            curl -fsSL "$URL" | tar xz -C "$TMPDIR"
            [ -f "$BINARY" ] && cp "$BINARY" "${BINARY}.bak"
            systemctl stop xpo-server
            cp "$TMPDIR/xpo-server" "$BINARY"
            chmod 755 "$BINARY"
            systemctl start xpo-server || { cp "${BINARY}.bak" "$BINARY" && systemctl start xpo-server && exit 1; }
            rm -rf "$TMPDIR"
            echo "Deployed xpo-server ${VERSION}"
        env:
          VERSION: ${{ github.ref_name }}
